<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MatriMatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- SAME NAVBAR -->
    <header class="navbar">
        <a href="index.html">Home</a>
        <a href="register.html" class="active">Register</a>
        <a href="login.html">Login</a>
        <a href="profile.html">Profile</a>
        <a href="dashboard.html">Dashboard</a>
    </header>

    <section class="form-section">
        <div class="form-container">
            <h1>Create Your Profile</h1>
            <p>Fill in your details</p>
            <form id="registerForm" class="register-form">
    <div class="form-group">
        <label>Full Name *</label>
        <input type="text" name="name" placeholder="Enter your full name" required>
    </div>
    <div class="form-group">
        <label>Email *</label>
        <input type="email" name="email" placeholder="Enter your email" required>
    </div>
    <div class="form-group">
        <label>Password *</label>
        <input type="password" name="password" placeholder="Enter your password" required>
    </div>
    <div class="form-group">
        <label>Age *</label>
        <input type="number" name="age" min="18" max="100" placeholder="Your age" required>
    </div>
    <div class="form-row">
        <div class="form-group">
            <label>Gender *</label>
            <select name="gender" required>
                <option value="">Select Gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>
        <div class="form-group">
            <label>Religion *</label>
            <select name="religion" required>
                <option value="">Select Religion</option>
                <option value="hindu">Hindu</option>
                <option value="muslim">Muslim</option>
                <option value="christian">Christian</option>
                <option value="sikh">Sikh</option>
            </select>
        </div>
    </div>
    <div class="form-group">
        <label>Location *</label>
        <input type="text" name="location" placeholder="Hyderabad, Telangana" required>
    </div>
    <div class="form-group">
        <label>Profession *</label>
        <input type="text" name="profession" placeholder="Software Developer" required>
    </div>
    <button type="submit" class="btn btn-primary full-width">Create Profile</button>
</form>

        </div>
    </section>
    <div id="msg" class="msg-box"></div>
    <script>
        // Register API connection code will go here
    </script>

    <script src="script.js"></script>


</body>
</html>
