<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - MatriMatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">MatriMatch</div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="register.html" class="nav-link active">Register</a></li>
                <li><a href="login.html" class="nav-link">Login</a></li>
            </ul>
        </div>
    </nav>

    <section class="form-section">
        <div class="container">
            <div class="form-container">
                <h1>Create Your Profile</h1>
                <p>Fill in your details</p>
                <form class="register-form">
                    <div class="form-group">
                        <label>Full Name *</label>
                        <input type="text" placeholder="Enter your full name" required>
                    </div>
                    <div class="form-group">
                        <label>Age *</label>
                        <input type="number" min="18" max="100" placeholder="Your age" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Gender *</label>
                            <select required>
                                <option value="">Select Gender</option>
                                <option value="male">Male</option>
                                <option value="female">Female</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Religion *</label>
                            <select required>
                                <option value="">Select Religion</option>
                                <option value="hindu">Hindu</option>
                                <option value="muslim">Muslim</option>
                                <option value="christian">Christian</option>
                                <option value="sikh">Sikh</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Location *</label>
                        <input type="text" placeholder="Hyderabad, Telangana">
                    </div>
                    <div class="form-group">
                        <label>Profession *</label>
                        <input type="text" placeholder="Software Developer">
                    </div>
                    <button type="submit" class="btn btn-primary full-width">Create Profile</button>
                </form>
            </div>
        </div>
    </section>
</body>
</html>
