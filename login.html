<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MatriMatch</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">MatriMatch</div>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="register.html" class="nav-link">Register</a></li>
                <li><a href="login.html" class="nav-link active">Login</a></li>
            </ul>
        </div>
    </nav>

    <!-- Login Form -->
    <section class="form-section">
        <div class="container">
            <div class="form-container">
                <h1>Welcome Back</h1>
                <p>Login to continue your search</p>
                <form class="login-form">
                    <div class="form-group">
                        <label>Email *</label>
                        <input type="email" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label>Password *</label>
                        <input type="password" placeholder="Enter your password" required>
                    </div>
                    <div class="form-options">
                        <label class="checkbox">
                            <input type="checkbox"> Remember me
                        </label>
                        <a href="#" class="forgot-password">Forgot Password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary full-width">Login</button>
                </form>
                <p class="form-footer">New user? <a href="register.html">Create account</a></p>
            </div>
        </div>
    </section>
</body>
</html>
